name: Sub Links Checker

on:
  workflow_dispatch: # این گزینه بهت اجازه میده به صورت دستی دکمه اجرا رو بزنی

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Run Checker Script
      run: python checker.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add alive.txt dead.txt
        # اگر تغییری ایجاد شده بود کامیت کن تا خطا نده
        git diff --quiet && git diff --staged --quiet || git commit -m "Update alive and dead sub links"
        git push
